spring:
  application:
    name: edukira-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/edukira_db
    username: ${DB_USERNAME:edukira}
    password: ${DB_PASSWORD:edukira123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway gere o schema — nunca usar create/update em prod
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  messages:
    basename: i18n/messages
    encoding: UTF-8
    default-locale: fr

server:
  port: 8080
  servlet:
    context-path: /api

# ── JWT ──────────────────────────────────────────
edukira:
  jwt:
    secret: ${JWT_SECRET:edukira-super-secret-key-change-in-production-min-256bits}
    expiration-ms: 900000          # 15 minutos
    refresh-expiration-ms: 604800000  # 7 dias

  # ── Mobile Money ─────────────────────────────
  wave:
    api-key: ${WAVE_API_KEY:}
    base-url: https://api.wave.com/v1

  orange-money:
    client-id: ${ORANGE_CLIENT_ID:}
    client-secret: ${ORANGE_CLIENT_SECRET:}
    base-url: https://api.orange.com/orange-money-webpay/ci/v1
    token-url: https://api.orange.com/oauth/v3/token

  mtn-momo:
    subscription-key: ${MTN_SUBSCRIPTION_KEY:}
    base-url: https://proxy.momoapi.mtn.com
    environment: ${MTN_ENVIRONMENT:sandbox}

  # ── SMS / WhatsApp ────────────────────────────
  africas-talking:
    api-key: ${AT_API_KEY:}
    username: ${AT_USERNAME:sandbox}
    sender-id: ${AT_SENDER_ID:EDUKIRA}

  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    whatsapp-from: ${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}

# ── Swagger UI ───────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

# ── Actuator ─────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.edukira: DEBUG
    org.springframework.security: INFO
